<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aichatter-reborn</title>
  </head>
  <body>
    <div class="main-container">
      <div class="left-chat-histories">
        <div class="logo">
          <img src="/public/logo.png" />
        </div>
        <div class="new-session-button-div">
          <button id="new-session-button">开启新对话</button>
        </div>
        <div class="chat-history-notice">聊天记录：</div>
        <div class="chat-histories-container" id="chat-histories-container">
          <!-- 对话记录将在这里动态添加 -->
        </div>
      </div>
      <div class="right-main-content">
        <div class="message-container" id="message-container">
        </div>
        <div class="input-area">
          <textarea placeholder="输入消息,Enter发送,Shift+Enter换行" id="input-box"></textarea>
          <div class="input-controls">
            <div class="thinking-toggle">
              <label>
                <input type="checkbox" id="thinking-toggle"> 思考模式
              </label>
            </div>
            <button type="submit" id="submit-button">发送</button>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
